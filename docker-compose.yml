services:
  expo:
    build: .
    container_name: expo-react-native

    ports:
      - "19000:19000"
      - "8081:8081"

    volumes:
      - .:/app
      - /app/node_modules

    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

    stdin_open: true
    tty: true

    command: npx expo start